pairs:
  - symbol: BTCUSDT
    exchanges: [binance, bybit]
  - symbol: ETHUSDT
    exchanges: [binance, bybit]

exchanges:
  binance:
    taker_fee_pct: 0.06
    slippage_estimate_pct: 0.04
  bybit:
    taker_fee_pct: 0.06
    slippage_estimate_pct: 0.04

capital_per_trade_usdt: 500
entry_buffer_multiplier: 1.5
slow_poll_interval_ms: 0
fast_poll_interval_ms: 0
staleness_threshold_ms: 0  # 0 = always fall back to REST (no WS in step-mode tests)
