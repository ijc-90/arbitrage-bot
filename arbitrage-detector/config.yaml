auto_pairs:
  min_volume_usdt: 100000   # 100k USDT 24h volume floor

exchanges:
  binance:
    taker_fee_pct: 0.10      # standard tier; 0.075% if paying fees in BNB
    slippage_estimate_pct: 0.04
  bybit:
    taker_fee_pct: 0.10      # standard tier
    slippage_estimate_pct: 0.04
  bingx:
    taker_fee_pct: 0.10      # standard tier
    slippage_estimate_pct: 0.04

capital_per_trade_usdt: 50
entry_buffer_multiplier: 2.0
slow_poll_interval_ms: 5000
fast_poll_interval_ms: 200
staleness_threshold_ms: 2000       # fall back to REST if WS tick older than this
max_net_spread_pct: 20             # ignore opportunities above this spread — almost always bad data
max_opportunity_duration_ms: 300000  # force-close stuck opportunity after 5 min (safeguard against frozen prices)
price_retention_hours: 6             # prune prices table to this rolling window; 0 = keep forever
liquidity_flag_threshold_pct: 0.1   # flag routes where capital exceeds 0.1% of smallest exchange's daily volume
execution_enabled: true             # set true to enable live order placement; requires API keys + risk controls
max_execution_age_ms: 2000            # reject execution if opportunity detected > this many ms ago

# Risk controls (AT-6) — required before deploying real capital
max_concurrent_positions: 1          # maximum simultaneous open trades
max_notional_per_exchange_usdt: 1000 # max USDT committed to any one exchange at once
max_daily_loss_usdt: 10              # circuit breaker: halt when daily loss exceeds this
max_drawdown_pct: 5                  # circuit breaker: halt when session drawdown > 5% of (capital_per_trade * 10)

# Order book depth (AT-5)
order_book_depth: 10                 # L2 levels to fetch per side for slippage computation
min_fill_ratio: 0.9                  # skip trade if < 90% of notional can be filled at current book depth

# Reconciliation (AT-9)
reconciliation_interval_hours: 4     # how often to compare realized PnL vs actual balance delta
reconciliation_tolerance_pct: 0.5    # warn if divergence exceeds 0.5% of cumulative PnL

dry_run_sandbox: true               # when true, logs [DRY-RUN] on order calls; use testnet URLs in .env

# Funding rate arbitrage (delta-neutral: long spot + short perp, same exchange)
# Collects funding payments every 8h with near-zero directional exposure.
# Requires API keys with trade permissions. Start with dry_run: true.
funding_arb:
  enabled: false
  dry_run: true                          # set false to place real orders
  scan_interval_ms: 60000               # poll funding rates every 60s
  poll_interval_ms: 60000               # check open positions every 60s
  capital_per_side_usdt: 100            # $100 spot + $100 perp margin per position
  entry_threshold_pct: 0.05             # enter when funding > 0.05%/8h (approx 66% APR)
  exit_threshold_pct: 0.01             # exit when funding drops below 0.01%/8h
  min_time_to_settlement_ms: 600000     # don't enter within 10min of settlement
  max_hold_hours: 72                    # force-close after 3 days
  max_positions: 3                      # max simultaneous positions
  stop_loss_pct: 2.0                    # exit if unrealized perp loss > 2% of notional
  liquidation_buffer_pct: 10.0          # exit if mark within 10% of liquidation price
  max_basis_pct: 0.5                    # alert if perp-spot basis > 0.5%
  leverage: 1                           # 1x = fully collateralised (safest)
