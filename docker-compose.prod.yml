services:
  detector:
    build: ./arbitrage-detector
    env_file: .env.prod
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - arb-data:/app/logs
    restart: unless-stopped

  pair-fetcher:
    build: ./pair-fetcher
    env_file: .env.prod
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - arb-data:/app/logs
    restart: unless-stopped
    depends_on:
      - detector

  dashboard:
    build: ./dashboard
    volumes:
      - arb-data:/app/logs
    ports:
      - "4000:4000"
    restart: unless-stopped
    depends_on:
      - detector

volumes:
  arb-data:
