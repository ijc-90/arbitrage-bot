name: scenario_detector_006_prices_intersect

# Prices move through the zero-spread crossover point across 3 steps.
# Tests that no false positive fires at or around the intersection.
#
# step 0: binance ask=43255, bybit bid=43250 → raw=(43250-43255)/43255 = -0.012% (no spread)
# step 1: binance ask=43252, bybit bid=43252 → raw=0.000% EXACT INTERSECTION
#         net = 0 - 0.20 = -0.200%  → no opportunity
# step 2: binance ask=43250, bybit bid=43255 → raw=(43255-43250)/43250 = +0.012%
#         net = 0.012 - 0.20 = -0.188%  → raw crossed positive but still below fees
#
# No opportunity should fire at any step.

exchanges:
  binance:
    symbol: BTCUSDT
    timeline:
      -
        bid: "43248.00"
        ask: "43255.00"
        bid_qty: "1.500"
        ask_qty: "1.200"
      -
        bid: "43251.00"
        ask: "43252.00"
        bid_qty: "1.500"
        ask_qty: "1.200"
      -
        bid: "43249.00"
        ask: "43250.00"
        bid_qty: "1.500"
        ask_qty: "1.200"

  bybit:
    symbol: BTCUSDT
    timeline:
      -
        bid: "43250.00"
        ask: "43252.00"
        bid_qty: "1.500"
        ask_qty: "1.200"
      -
        bid: "43252.00"
        ask: "43254.00"
        bid_qty: "1.500"
        ask_qty: "1.200"
      -
        bid: "43255.00"
        ask: "43257.00"
        bid_qty: "1.500"
        ask_qty: "1.200"
