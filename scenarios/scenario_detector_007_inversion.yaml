name: scenario_detector_007_inversion

# Spread inverts mid-run: opportunity A opens on one side, closes on convergence,
# then opportunity B opens on the opposite direction.
#
# step 0: no opportunity
#         binance ask=43255 > bybit bid=43250 → AB raw < 0
#
# step 1: OPP A — buy binance, sell bybit
#         binance ask=43250, bybit bid=43500
#         raw = (43500 - 43250) / 43250 * 100 = 0.578%
#         net = 0.578 - 0.20 = 0.378%  →  opportunity opens
#
# step 2: convergence (neutral — no opportunity either direction)
#         binance ask=43253, bybit bid=43252 → AB raw < 0
#         binance bid=43251, bybit ask=43254 → BA raw < 0
#
# step 3: convergence continued (second neutral step — safety for timing variance)
#         same prices as step 2
#
# step 4: OPP B — buy bybit, sell binance (opposite direction)
#         bybit ask=43253, binance bid=43500
#         raw = (43500 - 43253) / 43253 * 100 = 0.571%
#         net = 0.571 - 0.20 = 0.371%  →  new opportunity opens
#
# Run with --steps 5.
# Expected: OPENED(buy=binance) → CLOSED(CONVERGENCE) → OPENED(buy=bybit)

exchanges:
  binance:
    symbol: BTCUSDT
    timeline:
      -
        bid: "43249.00"
        ask: "43255.00"
        bid_qty: "1.500"
        ask_qty: "1.200"
      -
        bid: "43249.00"
